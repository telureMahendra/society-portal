<div class="create-container animate-up">
    <header class="page-header">
        <div class="header-content">
            <button class="back-btn" routerLink="/complaints"><i class="fas fa-arrow-left"></i></button>
            <h1>Raise a <span>Complaint</span></h1>
        </div>
    </header>

    <div class="form-card glass-card">
        <form [formGroup]="complaintForm" (ngSubmit)="onSubmit()">
            
            <div class="form-section">
                <h3><i class="fas fa-info-circle"></i> Basic Details</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Category <span class="required">*</span></label>
                        <select formControlName="categoryId" class="form-control" [class.is-invalid]="complaintForm.get('categoryId')?.invalid && complaintForm.get('categoryId')?.touched">
                            <option value="">Select a category</option>
                            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
                        </select>
                        <div class="error-msg" *ngIf="complaintForm.get('categoryId')?.invalid && complaintForm.get('categoryId')?.touched">
                            Category is required
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Priority <span class="required">*</span></label>
                        <select formControlName="priority" class="form-control" [class.is-invalid]="complaintForm.get('priority')?.invalid && complaintForm.get('priority')?.touched">
                            <option *ngFor="let p of priorities" [value]="p">{{ p | titlecase }}</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Title <span class="required">*</span></label>
                    <input type="text" formControlName="title" class="form-control" placeholder="Brief summary of the issue"
                           [class.is-invalid]="complaintForm.get('title')?.invalid && complaintForm.get('title')?.touched">
                    <div class="error-msg" *ngIf="complaintForm.get('title')?.errors?.['required'] && complaintForm.get('title')?.touched">
                        Title is required
                    </div>
                    <div class="error-msg" *ngIf="complaintForm.get('title')?.errors?.['maxlength']">
                        Title cannot exceed 100 characters
                    </div>
                </div>

                <div class="form-group">
                    <label>Description <span class="required">*</span></label>
                    <textarea formControlName="description" class="form-control" rows="4" placeholder="Detailed description of the issue"
                              [class.is-invalid]="complaintForm.get('description')?.invalid && complaintForm.get('description')?.touched"></textarea>
                    <div class="error-msg" *ngIf="complaintForm.get('description')?.errors?.['required'] && complaintForm.get('description')?.touched">
                        Description is required
                    </div>
                </div>

                <div class="form-group">
                    <label>Location/Flat <span class="required">*</span></label>
                    <input type="text" formControlName="location" class="form-control" placeholder="E.g., Flat 101, Lobby, Clubhouse"
                           [class.is-invalid]="complaintForm.get('location')?.invalid && complaintForm.get('location')?.touched">
                    <div class="error-msg" *ngIf="complaintForm.get('location')?.invalid && complaintForm.get('location')?.touched">
                        Location is required
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3><i class="fas fa-paperclip"></i> Attachment (Optional)</h3>
                <p class="section-desc">Upload a photo or document related to this complaint (Max 5MB)</p>
                
                <div class="upload-area" [class.has-file]="selectedFile" (click)="!selectedFile && fileInput.click()">
                    <input type="file" #fileInput (change)="onFileSelected($event)" style="display: none" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
                    
                    <div class="upload-prompt" *ngIf="!selectedFile && !isUploading">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>Click to browse files</span>
                    </div>

                    <div class="uploading" *ngIf="isUploading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span>Uploading...</span>
                    </div>

                    <div class="file-info" *ngIf="selectedFile && !isUploading">
                        <i class="fas fa-file-alt"></i>
                        <span class="file-name">{{ selectedFile.name }}</span>
                        <button type="button" class="remove-btn" (click)="removeFile(); $event.stopPropagation()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-outline" routerLink="/complaints">Cancel</button>
                <button type="submit" class="btn btn-primary" [disabled]="complaintForm.invalid || isSubmitting || isUploading">
                    <i class="fas" [ngClass]="isSubmitting ? 'fa-spinner fa-spin' : 'fa-paper-plane'"></i> 
                    {{ isSubmitting ? 'Submitting...' : 'Submit Complaint' }}
                </button>
            </div>
        </form>
    </div>
</div>
